apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-api-canary
  labels:
    app: aceest-fitness
    tier: backend
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: canary
        version: "canary"
    spec:
      containers:
      - name: aceest-fitness
        image: sallout/aceest-fitness:canary
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /health
            port: 5000