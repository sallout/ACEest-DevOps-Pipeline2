services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: aceest_jenkins
    user: root 
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - ./jenkins_data:/var/jenkins_home 
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - aceest_network

  sonarqube:
    image: sonarqube:lts-community
    container_name: aceest_sonarqube
    ports:
      - "9001:9000" 
    volumes:
      - ./sonar_data:/opt/sonarqube/data
      - ./sonar_logs:/opt/sonarqube/logs
      - ./sonar_extensions:/opt/sonarqube/extensions
    networks:
      - aceest_network

networks:
  aceest_network:
    name: aceest_isolated_network
    driver: bridge